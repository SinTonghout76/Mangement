<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --mint-bg: #f0fdf4;
      --mint-accent: #22c55e;
      --dark-green: #14532d;
      --glass-bg: rgba(255,255,255,0.7);
      --vibrant-mint: #8aff8a;
    }

    body {
      background: var(--mint-bg);
      font-family: "Segoe UI", sans-serif;
      color: var(--dark-green);
      padding-top: 120px;
    }

    /* NAVBAR */
    .navbar-container {
      position: fixed;
      top: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 1000;
    }

    .custom-nav {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border-radius: 100px;
      padding: 10px 30px;
      width: 90%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .nav-brand {
      font-weight: 800;
      text-decoration: none;
      color: var(--dark-green);
    }

    .nav-brand span {
      color: var(--mint-accent);
    }

    .custom-nav-link {
      text-decoration: none;
      color: var(--dark-green);
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      margin-left: 10px;
    }

    .custom-nav-link:hover {
      color: var(--mint-accent);
    }

    .custom-nav-link.active {
      background: var(--mint-accent);
      color: white;
    }

    /* PROFILE */
    .profile-container {
      background: white;
      border-radius: 35px;
      padding: 50px;
      max-width: 850px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .img-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      margin: auto;
    }

    .profile-img-main {
      width: 100%;
      height: 100%;
      border-radius: 45px;
      border: 5px solid var(--vibrant-mint);
      object-fit: cover;
    }

    .verify-badge {
      position: absolute;
      bottom: -5px;
      right: -5px;
      background: #007bff;
      color: white;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid white;
    }

    .info-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 15px;
    }

    .edu-card {
      background: var(--mint-bg);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 10px;
    }

    .social-link {
      background: var(--mint-bg);
      padding: 10px 20px;
      border-radius: 15px;
      text-decoration: none;
      color: var(--dark-green);
      font-weight: 600;
    }

    .social-link:hover {
      background: var(--vibrant-mint);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar-container">
  <nav class="custom-nav">
    <a href="index.html" class="nav-brand">HOUT<span>.DEV</span></a>
    <div>
      <a href="index.html" class="custom-nav-link">Home</a>
      <a href="project.html" class="custom-nav-link">Project</a>
      <a href="aboutme.html" class="custom-nav-link">About</a>
      <a href="profile.html" class="custom-nav-link active">Profile</a>
    </div>
  </nav>
</div>

<!-- PROFILE -->
<div class="profile-container text-center">

  <div class="img-wrapper">
    <img id="displayPhoto" class="profile-img-main"/>
    <div class="verify-badge">
      <i class="bi bi-patch-check-fill"></i>
    </div>
  </div>

  <h2 id="displayName" class="mt-3"></h2>

  <div class="row g-3 mt-4 text-start">
    <div class="col-6"><div class="info-card"><small>Status</small><br><b id="displayStatus"></b></div></div>
    <div class="col-6"><div class="info-card"><small>Location</small><br><b id="displayLocation"></b></div></div>
    <div class="col-6"><div class="info-card"><small>Focus</small><br><b id="displayFocus"></b></div></div>
    <div class="col-6"><div class="info-card"><small>Phone</small><br><b id="displayPhone"></b></div></div>
  </div>

  <div class="text-start mt-5">
    <h5><i class="bi bi-mortarboard-fill"></i> Education</h5>
    <div id="educationList"></div>
  </div>

  <div class="text-start mt-4">
    <h5><i class="bi bi-person-lines-fill"></i> Socials</h5>
    <div class="d-flex gap-2 mt-2">
      <a id="linkEmail" class="social-link">Email</a>
      <a id="linkFb" class="social-link" target="_blank">Facebook</a>
      <a id="linkTg" class="social-link" target="_blank">Telegram</a>
    </div>
  </div>

  <button class="btn btn-success mt-4 px-4" data-bs-toggle="modal" data-bs-target="#editModal">
    Edit My Profile
  </button>
</div>

<!-- MODAL -->
<div class="modal fade" id="editModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <input id="inPhotoURL" class="form-control mb-2" placeholder="Photo URL"/>
      <input type="file" id="inPhotoFile" class="form-control mb-2"/>

      <input id="inName" class="form-control mb-2" placeholder="Name"/>
      <input id="inFocus" class="form-control mb-2" placeholder="Focus"/>
      <input id="inStatus" class="form-control mb-2" placeholder="Status"/>
      <input id="inLocation" class="form-control mb-2" placeholder="Location"/>
      <input id="inPhone" class="form-control mb-2" placeholder="Phone"/>

      <!-- NEW SOCIAL INPUTS -->
      <input id="inEmail" class="form-control mb-2" placeholder="Email"/>
      <input id="inFb" class="form-control mb-2" placeholder="Facebook URL"/>
      <input id="inTg" class="form-control mb-2" placeholder="Telegram Username"/>

      <input id="inEduYear0" class="form-control mb-2" placeholder="Year 1"/>
      <input id="inEduSchool0" class="form-control mb-2" placeholder="School 1"/>

      <input id="inEduYear1" class="form-control mb-2" placeholder="Year 2"/>
      <input id="inEduSchool1" class="form-control mb-2" placeholder="School 2"/>

      <button class="btn btn-success mt-2" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<script>
const defaultUser = {
  name: "Sin TongHout",
  photo: "https://ui-avatars.com/api/?name=Hout",
  status: "Single",
  location: "Phnom Penh",
  focus: "Frontend Mastery",
  contact: {
    phone: "+855...",
    email: "email@gmail.com",
    facebook: "#",
    telegram_username: "hout"
  },
  education: [
    { year: "Year 3", dept: "Biology", school: "RUPP" },
    { year: "Year 3", dept: "IT", school: "UC" }
  ]
};

function getUser(){
  let data = localStorage.getItem("user");
  if(!data){
    localStorage.setItem("user", JSON.stringify(defaultUser));
    return defaultUser;
  }
  return JSON.parse(data);
}

function loadProfile(){
  let u = getUser();

  displayName.innerText = u.name;
  displayStatus.innerText = u.status;
  displayLocation.innerText = u.location;
  displayFocus.innerText = u.focus;
  displayPhone.innerText = u.contact.phone;
  displayPhoto.src = u.photo;

  linkEmail.href = "mailto:" + u.contact.email;
  linkFb.href = u.contact.facebook;
  linkTg.href = "https://t.me/" + u.contact.telegram_username.replace("@","");

  educationList.innerHTML = "";
  u.education.forEach(e=>{
    educationList.innerHTML += `
      <div class="edu-card">
        <b>${e.school}</b> (${e.year})<br>
        <small>${e.dept}</small>
      </div>`;
  });

  // Fill modal
  inName.value = u.name;
  inFocus.value = u.focus;
  inStatus.value = u.status;
  inLocation.value = u.location;
  inPhone.value = u.contact.phone;

  inEmail.value = u.contact.email;
  inFb.value = u.contact.facebook;
  inTg.value = u.contact.telegram_username;

  inEduYear0.value = u.education[0].year;
  inEduSchool0.value = u.education[0].school;
  inEduYear1.value = u.education[1].year;
  inEduSchool1.value = u.education[1].school;
}

async function saveProfile(){
  let file = inPhotoFile.files[0];
  let photo = inPhotoURL.value || getUser().photo;

  if(file){
    photo = await new Promise(res=>{
      let r = new FileReader();
      r.onload = e=>res(e.target.result);
      r.readAsDataURL(file);
    });
  }

  let user = {
    name: inName.value,
    photo,
    focus: inFocus.value,
    status: inStatus.value,
    location: inLocation.value,
    contact:{
      phone: inPhone.value,
      email: inEmail.value,
      facebook: inFb.value,
      telegram_username: inTg.value
    },
    education:[
      {year: inEduYear0.value, dept:"Biology", school: inEduSchool0.value},
      {year: inEduYear1.value, dept:"IT", school: inEduSchool1.value}
    ]
  };

  localStorage.setItem("user", JSON.stringify(user));
  location.reload();
}

loadProfile();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
